<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>আমাদের চ্যাট</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --green: #25d366;
  --green-dk: #075e54;
  --green-md: #128c7e;
  --green-bubble: #005c4b;
  --blue-tick: #53bdeb;
  --bg: #0b141a;
  --hdr: #1f2c34;
  --inp-bg: #2a3942;
  --bubble-in: #1e2b33;
  --txt: #e9edef;
  --txt2: #8696a0;
  --border: rgba(134,150,160,.15);
  --r: 8px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
  font-family: 'Noto Sans Bengali', sans-serif;
  background: var(--bg);
  color: var(--txt);
}

/* ── FULL HEIGHT STACK ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh; /* dynamic viewport — handles mobile browser chrome */
  height: -webkit-fill-available;
  width: 100%;
  overflow: hidden;
  position: relative;
}

/* ════════ LOGIN ════════ */
#login-screen {
  position: fixed; inset: 0; z-index: 300;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px;
}
#login-screen.hidden { display: none; }

.logo-ring {
  width: 76px; height: 76px; border-radius: 50%;
  background: var(--green);
  display: flex; align-items: center; justify-content: center;
  font-size: 38px; margin-bottom: 18px;
  box-shadow: 0 0 0 8px rgba(37,211,102,.12);
}
.login-title { font-size: 22px; font-weight: 700; margin-bottom: 5px; }
.login-sub { color: var(--txt2); font-size: 13px; margin-bottom: 36px; }

.login-card {
  background: var(--hdr); border-radius: 18px;
  padding: 26px 22px; width: 100%; max-width: 340px;
  border: 1px solid var(--border);
}
.lbl { font-size: 11px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--green); margin-bottom: 10px; display: block; }

.pass-wrap { position: relative; margin-bottom: 10px; }
#login-input {
  width: 100%; padding: 13px 46px 13px 16px;
  background: var(--inp-bg); border: 1.5px solid rgba(255,255,255,.1);
  border-radius: 12px; color: var(--txt);
  font-size: 18px; font-family: inherit;
  letter-spacing: 3px; outline: none;
  transition: border-color .2s;
  -webkit-appearance: none;
}
#login-input:focus { border-color: var(--green); }
#login-input::placeholder { opacity: .35; letter-spacing: 2px; }
.eye { position: absolute; right: 13px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 18px; cursor: pointer; opacity: .5; padding: 4px; }

.err { min-height: 18px; font-size: 12px; color: #ff6b6b; text-align: center; margin-bottom: 10px; }
#login-btn {
  width: 100%; padding: 14px; border: none; border-radius: 12px;
  background: var(--green); color: #fff;
  font-size: 15px; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: opacity .15s;
}
#login-btn:active { opacity: .85; }

/* ════════ HEADER ════════ */
#hdr {
  flex-shrink: 0;
  background: var(--hdr);
  display: flex; align-items: center; gap: 10px;
  padding: 0 8px 0 12px;
  height: 58px;
  border-bottom: 1px solid var(--border);
  /* safe area top for notch phones */
  padding-top: env(safe-area-inset-top);
}
.av {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--green-dk);
  display: flex; align-items: center; justify-content: center;
  font-size: 21px; flex-shrink: 0;
}
.hdr-info { flex: 1; min-width: 0; }
.hdr-info h2 { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hdr-info p  { font-size: 11.5px; color: var(--green); margin-top: 1px; }

.hdr-actions { display: flex; gap: 2px; flex-shrink: 0; }
.icon-btn {
  width: 42px; height: 42px; border-radius: 50%;
  background: none; border: none; color: var(--txt2);
  font-size: 19px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
  /* big enough touch target */
}
.icon-btn:active { background: rgba(255,255,255,.08); }

#timer-sel {
  background: rgba(255,255,255,.07); border: none; border-radius: 20px;
  color: var(--txt2); font-size: 11px; padding: 5px 8px;
  font-family: inherit; outline: none; cursor: pointer;
  max-width: 80px;
}
#timer-sel option { background: #1f2c34; color: var(--txt); }

/* ════════ TYPING ════════ */
#typing-bar {
  flex-shrink: 0; background: var(--hdr);
  padding: 4px 16px; font-size: 12px; color: var(--green);
  display: none; align-items: center; gap: 6px;
  border-bottom: 1px solid var(--border);
}
#typing-bar.on { display: flex; }
.dots { display: flex; gap: 3px; align-items: center; }
.dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: blink 1.2s infinite; }
.dots span:nth-child(2){animation-delay:.2s} .dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}

/* ════════ MESSAGES ════════ */
#msgs {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding: 8px 10px 6px;
  display: flex;
  flex-direction: column;
  gap: 1px;
  /* GPU layer for smooth scroll */
  will-change: scroll-position;
  transform: translateZ(0);
}

/* thin scrollbar */
#msgs::-webkit-scrollbar { width: 3px; }
#msgs::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 3px; }

.date-sep {
  align-self: center;
  background: var(--hdr); color: var(--txt2);
  font-size: 11px; padding: 4px 14px; border-radius: 8px;
  margin: 8px 0; pointer-events: none;
}

/* ── Group ── */
.grp { display: flex; flex-direction: column; animation: pop .15s ease; }
@keyframes pop { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
.grp.me    { align-items: flex-end; }
.grp.them  { align-items: flex-start; }
.grp + .grp { margin-top: 2px; }

/* bubble row */
.brow {
  display: flex; align-items: flex-end; gap: 4px;
  max-width: min(78vw, 360px);
}
.grp.me   .brow { flex-direction: row; }
.grp.them .brow { flex-direction: row-reverse; }

/* swipe wrap */
.sw {
  position: relative;
  border-radius: var(--r);
  max-width: 100%;
  /* hardware accelerated transform */
  will-change: transform;
  transform: translateZ(0);
  transition: transform .12s ease;
}
.sw.dragging { transition: none; }

.rarrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  font-size: 15px; opacity: 0; pointer-events: none;
  color: var(--txt2); transition: opacity .1s;
}
.grp.me   .rarrow { left: -24px; }
.grp.them .rarrow { right: -24px; }
.rarrow.show { opacity: 1; }

/* action btns */
.acts {
  display: flex; flex-direction: column; gap: 3px;
  opacity: 0; transition: opacity .15s; flex-shrink: 0;
}
.grp:hover .acts, .grp.sel .acts { opacity: 1; }
.abt {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--hdr); border: 1px solid rgba(255,255,255,.1);
  color: var(--txt2); font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 1px 4px rgba(0,0,0,.3);
  /* big touch target but small visual */
  position: relative;
}
.abt::after { content:''; position:absolute; inset:-6px; }
.abt:active { background: rgba(255,255,255,.12); }

/* bubble wrap */
.bwrap { display: flex; flex-direction: column; }
.grp.me   .bwrap { align-items: flex-end; }
.grp.them .bwrap { align-items: flex-start; }

/* reply preview */
.rpreview {
  border-left: 3px solid currentColor;
  padding: 5px 9px 4px; border-radius: 6px 6px 0 0;
  font-size: 11.5px; background: rgba(0,0,0,.2);
  max-width: 100%; overflow: hidden; cursor: pointer;
}
.rpreview .rname { font-weight: 700; margin-bottom: 2px; font-size: 12px; }
.rpreview .rtxt  { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: .8; }

/* bubble */
.bbl {
  padding: 6px 10px;
  font-size: 14.5px; line-height: 1.55;
  word-break: break-word; white-space: pre-wrap;
  box-shadow: 0 1px 1px rgba(0,0,0,.2);
}
.grp.me   .bbl { background: var(--green-bubble); color: #e9edef; border-radius: var(--r) var(--r) 2px var(--r); }
.grp.them .bbl { background: var(--bubble-in);    color: #e9edef; border-radius: var(--r) var(--r) var(--r) 2px; }

/* when has reply preview — flatten top */
.hreply .bbl {
  border-radius: 0 0 var(--r) var(--r) !important;
}
.grp.me   .hreply .bbl { border-radius: 0 0 2px var(--r) !important; }
.grp.them .hreply .bbl { border-radius: 0 0 var(--r) 2px !important; }

/* image */
.imgb {
  max-width: 210px; border-radius: var(--r); overflow: hidden;
  cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.3);
}
.imgb img { width: 100%; display: block; }

/* meta */
.meta {
  display: flex; align-items: center; gap: 3px;
  font-size: 10.5px; color: var(--txt2);
  margin-top: 2px; padding: 0 3px; user-select: none;
}
.grp.me   .meta { justify-content: flex-end; }
.grp.them .meta { justify-content: flex-start; }
.tick      { font-size: 13px; line-height: 1; }
.tick.seen { color: var(--blue-tick); }
.tick.sent { color: var(--txt2); }
.tbadge    { color: #f59e0b; font-size: 10px; }

/* reactions */
.rxns { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 3px; padding: 0 2px; }
.rxchip {
  background: var(--hdr); border: 1px solid rgba(255,255,255,.1);
  border-radius: 20px; padding: 3px 8px; font-size: 12px;
  cursor: pointer; display: flex; align-items: center; gap: 3px;
  color: var(--txt2); transition: border-color .1s;
}
.rxchip.mine { border-color: var(--green); color: var(--green); background: rgba(37,211,102,.1); }

/* ════════ EMOJI PICKER ════════ */
#epicker {
  position: fixed; z-index: 400;
  background: var(--hdr); border-radius: 40px;
  padding: 8px 14px; gap: 8px;
  box-shadow: 0 4px 24px rgba(0,0,0,.5);
  border: 1px solid var(--border);
  display: none; align-items: center;
}
#epicker.on { display: flex; }
.ep { font-size: 24px; cursor: pointer; transition: transform .1s; line-height: 1; }
.ep:active { transform: scale(1.3); }

/* ════════ REPLY BANNER ════════ */
#rbanner {
  flex-shrink: 0; background: var(--inp-bg);
  padding: 8px 14px; display: none; align-items: center; gap: 10px;
  border-top: 1px solid var(--border);
}
#rbanner.on { display: flex; }
.rb-inner { flex: 1; border-left: 3px solid var(--green); padding: 3px 10px; font-size: 12px; min-width: 0; }
.rb-name { font-weight: 700; color: var(--green); margin-bottom: 2px; }
.rb-text { color: var(--txt2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rb-x {
  width: 30px; height: 30px; border-radius: 50%; border: none;
  background: rgba(255,255,255,.08); color: var(--txt2);
  font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* ════════ IMAGE PREVIEW ════════ */
#imgprev {
  flex-shrink: 0; background: var(--inp-bg);
  border-top: 1px solid var(--border);
  padding: 10px 14px; display: none; align-items: center; gap: 12px;
}
#imgprev.on { display: flex; }
#prev-thumb { width: 54px; height: 54px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }
.prev-lbl { font-size: 13px; color: var(--txt2); flex: 1; }
.prev-x {
  width: 32px; height: 32px; border-radius: 50%; border: none;
  background: rgba(255,255,255,.08); color: var(--txt2);
  font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.prev-send {
  width: 42px; height: 42px; border-radius: 50%; border: none;
  background: var(--green); color: #fff;
  font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(37,211,102,.4);
}

/* ════════ UPLOAD BAR ════════ */
#upbar {
  flex-shrink: 0; background: var(--hdr);
  padding: 5px 16px; font-size: 12px; color: var(--green);
  display: none; align-items: center; gap: 6px;
  border-top: 1px solid var(--border);
}
#upbar.on { display: flex; }

/* ════════ FOOTER ════════ */
#footer {
  flex-shrink: 0;
  background: var(--bg);
  padding: 6px 8px;
  display: flex; align-items: flex-end; gap: 7px;
  /* safe area bottom for iPhone home bar */
  padding-bottom: max(8px, env(safe-area-inset-bottom));
}

.inp-wrap {
  flex: 1; background: var(--inp-bg); border-radius: 26px;
  display: flex; align-items: flex-end;
  padding: 3px 4px 3px 6px; gap: 2px;
  min-height: 46px;
}
.fi-btn {
  width: 38px; height: 38px; flex-shrink: 0; border-radius: 50%;
  background: none; border: none; color: var(--txt2);
  font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  /* larger touch area */
  position: relative;
}
.fi-btn::after { content:''; position:absolute; inset:-4px; }
.fi-btn:active { color: var(--green); }

#msg-input {
  flex: 1; background: transparent; border: none;
  color: var(--txt); font-size: 15px; font-family: inherit;
  resize: none; outline: none;
  max-height: 130px; line-height: 1.5;
  padding: 10px 6px;
  align-self: center;
  /* prevent zoom on focus iOS */
  font-size: max(16px, 14.5px);
}
#msg-input::placeholder { color: var(--txt2); opacity: .65; }

#send-btn {
  width: 46px; height: 46px; flex-shrink: 0; border-radius: 50%;
  background: var(--green); color: #fff; border: none;
  font-size: 21px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 10px rgba(37,211,102,.35);
  transition: background .15s, transform .1s;
}
#send-btn:active { background: var(--green-md); transform: scale(.95); }
#file-in { display: none; }

/* ════════ LIGHTBOX ════════ */
#lbox {
  position: fixed; inset: 0; z-index: 600;
  background: rgba(0,0,0,.95);
  display: none; align-items: center; justify-content: center;
  padding: 16px;
}
#lbox.on { display: flex; }
#lbox img { max-width: 100%; max-height: 90dvh; border-radius: 8px; }
#lbox-x {
  position: absolute; top: 14px; right: 14px;
  width: 38px; height: 38px; border-radius: 50%;
  background: rgba(255,255,255,.12); border: none; color: #fff;
  font-size: 18px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* ════════ CONFIRM ════════ */
#confirm {
  position: fixed; inset: 0; z-index: 700;
  background: rgba(0,0,0,.6);
  display: none; align-items: center; justify-content: center;
  padding: 20px;
}
#confirm.on { display: flex; }
.conf-box {
  background: var(--hdr); border-radius: 18px;
  padding: 26px 22px; width: 100%; max-width: 300px;
  text-align: center; border: 1px solid var(--border);
}
.conf-box h4 { font-size: 16px; margin-bottom: 8px; }
.conf-box p  { font-size: 13px; color: var(--txt2); margin-bottom: 22px; }
.conf-btns   { display: flex; gap: 10px; }
.conf-btns button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; }
.c-cancel { background: rgba(255,255,255,.1); color: var(--txt); }
.c-del    { background: #e53e3e; color: #fff; }

/* ════════ SCROLL DOWN BTN ════════ */
#scrolldn {
  position: fixed; right: 14px; bottom: 80px; z-index: 100;
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--hdr); border: 1px solid var(--border);
  color: var(--txt2); font-size: 20px; cursor: pointer;
  display: none; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,.4);
}
#scrolldn.on { display: flex; }
</style>
</head>
<body>
<div id="app">

<!-- LOGIN -->
<div id="login-screen">
  <div class="logo-ring">💬</div>
  <div class="login-title">আমাদের চ্যাট</div>
  <div class="login-sub">প্রবেশ করতে পাসওয়ার্ড দাও</div>
  <div class="login-card">
    <label class="lbl">পাসওয়ার্ড</label>
    <div class="pass-wrap">
      <input type="password" id="login-input" placeholder="••••••••" autocomplete="off" spellcheck="false">
      <button class="eye" id="eye-btn" onclick="toggleEye()">👁</button>
    </div>
    <div class="err" id="login-err"></div>
    <button id="login-btn" onclick="doLogin()">প্রবেশ করো →</button>
  </div>
</div>

<!-- HEADER -->
<header id="hdr">
  <div class="av" id="my-av">?</div>
  <div class="hdr-info">
    <h2>আমাদের চ্যাট 💬</h2>
    <p id="hdr-sub">লোড হচ্ছে...</p>
  </div>
  <div class="hdr-actions">
    <select id="timer-sel" title="মেসেজ টাইমার">
      <option value="0">⏱ বন্ধ</option>
      <option value="3600">⏱ ১ ঘণ্টা</option>
      <option value="86400">⏱ ২৪ ঘণ্টা</option>
      <option value="604800">⏱ ৭ দিন</option>
    </select>
    <button class="icon-btn" onclick="confirmDel()" title="সব মুছো">🗑</button>
    <button class="icon-btn" onclick="doLogout()" title="লগআউট">↩</button>
  </div>
</header>

<!-- TYPING -->
<div id="typing-bar">
  <div class="dots"><span></span><span></span><span></span></div>
  <span id="typing-txt">টাইপ করছে...</span>
</div>

<!-- MESSAGES -->
<div id="msgs"></div>

<!-- UPLOAD -->
<div id="upbar"><span>📤</span><span>ছবি পাঠানো হচ্ছে...</span></div>

<!-- REPLY BANNER -->
<div id="rbanner">
  <div class="rb-inner">
    <div class="rb-name" id="rb-name"></div>
    <div class="rb-text" id="rb-text"></div>
  </div>
  <button class="rb-x" onclick="cancelReply()">✕</button>
</div>

<!-- IMAGE PREVIEW -->
<div id="imgprev">
  <img id="prev-thumb" src="" alt="">
  <span class="prev-lbl">ছবি পাঠাবে?</span>
  <button class="prev-x" onclick="cancelImg()">✕</button>
  <button class="prev-send" onclick="sendImg()">➤</button>
</div>

<!-- FOOTER -->
<div id="footer">
  <div class="inp-wrap">
    <button class="fi-btn" onclick="document.getElementById('file-in').click()" title="ছবি">📷</button>
    <input type="file" id="file-in" accept="image/*">
    <textarea id="msg-input" placeholder="মেসেজ লিখো..." rows="1"></textarea>
    <button class="fi-btn" title="ইমোজি">😊</button>
  </div>
  <button id="send-btn" onclick="sendMsg()">➤</button>
</div>

</div><!-- #app -->

<!-- EMOJI PICKER (outside app so it overlays freely) -->
<div id="epicker">
  <span class="ep" onclick="reactWith('❤️')">❤️</span>
  <span class="ep" onclick="reactWith('😂')">😂</span>
  <span class="ep" onclick="reactWith('👍')">👍</span>
  <span class="ep" onclick="reactWith('😮')">😮</span>
  <span class="ep" onclick="reactWith('😢')">😢</span>
  <span class="ep" onclick="reactWith('🔥')">🔥</span>
</div>

<!-- LIGHTBOX -->
<div id="lbox" onclick="closeLbox()">
  <button id="lbox-x" onclick="closeLbox()">✕</button>
  <img id="lbox-img" src="" alt="">
</div>

<!-- CONFIRM -->
<div id="confirm">
  <div class="conf-box">
    <h4>🗑 সব মেসেজ মুছবে?</h4>
    <p>এই কাজ আর ফেরানো যাবে না</p>
    <div class="conf-btns">
      <button class="c-cancel" onclick="closeConf()">বাতিল</button>
      <button class="c-del" onclick="delAll()">মুছে ফেলো</button>
    </div>
  </div>
</div>

<!-- SCROLL DOWN -->
<button id="scrolldn" onclick="goBottom()">↓</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase,ref,push,onValue,remove,update,set,serverTimestamp,get }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* ── config ── */
const USERS = {
  Datla: { emoji:"👦", color:"#3b82f6" },
  Datli: { emoji:"👧", color:"#ec4899" },
};
const FB = {
  apiKey:"AIzaSyDi7Adni15nsyeKejv-KgvHxlXTdp_eZZ4",
  authDomain:"chat-60009.firebaseapp.com",
  databaseURL:"https://chat-60009-default-rtdb.firebaseio.com",
  projectId:"chat-60009",
  storageBucket:"chat-60009.firebasestorage.app",
  messagingSenderId:"830655265752",
  appId:"1:830655265752:web:133cca04624244642d50ad"
};
const db      = getDatabase(initializeApp(FB));
const msgsRef = ref(db,"messages");
const typRef  = ref(db,"typing");
const seenRef = ref(db,"seen");

/* ── state ── */
let me = sessionStorage.getItem("chat_user");
let lastDate="", showPass=false, pendingImg=null;
let replyTo=null, emojiKey=null, typTimer=null;
let allKeys=[], seenCache={}, visible=true;

/* ── viewport fix for mobile keyboards ── */
function setVH(){
  document.getElementById("app").style.height = window.innerHeight+"px";
}
window.addEventListener("resize", setVH, {passive:true});
setVH();

/* ── visibility ── */
document.addEventListener("visibilitychange",()=>{
  visible=!document.hidden; if(visible&&me) markSeen();
});

/* ── helpers ── */
const $=id=>document.getElementById(id);
const esc=t=>String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
function toggle(id,cls,on){ $(id).classList.toggle(cls,on); }

/* ── login ── */
window.toggleEye=()=>{
  showPass=!showPass;
  $("login-input").type=showPass?"text":"password";
  $("eye-btn").textContent=showPass?"🙈":"👁";
};
window.doLogin=()=>{
  const v=$("login-input").value.trim();
  if(USERS[v]){
    sessionStorage.setItem("chat_user",v); me=v;
    $("login-screen").classList.add("hidden");
    startChat();
  } else {
    $("login-err").textContent="❌ পাসওয়ার্ড সঠিক নয়";
    $("login-input").value=""; $("login-input").focus();
  }
};
$("login-input").addEventListener("keydown",e=>{ if(e.key==="Enter") doLogin(); });

window.doLogout=()=>{
  clearTyp(); sessionStorage.removeItem("chat_user"); me="";
  $("login-input").value=""; $("login-err").textContent="";
  $("login-screen").classList.remove("hidden");
};

if(me&&USERS[me]){ $("login-screen").classList.add("hidden"); startChat(); }

/* ── typing ── */
function sendTyp(){
  if(!me)return; set(ref(db,"typing/"+me),{ts:Date.now()});
  clearTimeout(typTimer); typTimer=setTimeout(clearTyp,3000);
}
function clearTyp(){ if(!me)return; set(ref(db,"typing/"+me),null); }

/* ── seen ── */
function markSeen(){
  if(!me||!allKeys.length)return;
  set(ref(db,"seen/"+me),allKeys[allKeys.length-1]);
}

/* ── scroll ── */
const box=$("msgs");
function goBottom(){ box.scrollTop=box.scrollHeight; }
window.goBottom=goBottom;
box.addEventListener("scroll",()=>{
  const atBot=box.scrollHeight-box.scrollTop-box.clientHeight<80;
  toggle("scrolldn","on",!atBot);
},{ passive:true });

/* ── start ── */
function startChat(){
  const u=USERS[me];
  $("my-av").textContent=u.emoji;
  $("hdr-sub").textContent=me+" এ স্বাগত! 👋";

  onValue(msgsRef,snap=>{
    const atBot=box.scrollHeight-box.scrollTop-box.clientHeight<120;
    const oldSet=new Set(allKeys);
    box.innerHTML=""; lastDate=""; allKeys=[];
    snap.forEach(ch=>{
      const msg=ch.val(), key=ch.key;
      if(msg.expiresAt&&Date.now()>msg.expiresAt){ remove(ref(db,"messages/"+key)); return; }
      allKeys.push(key);
      buildMsg(key,msg,!oldSet.has(key));
    });
    if(atBot||allKeys.length<=20){ goBottom(); markSeen(); }
    drawTicks();
  });

  onValue(typRef,snap=>{
    const d=snap.val()||{};
    const other=Object.keys(USERS).find(n=>n!==me);
    const typing=d[other]&&(Date.now()-d[other].ts<4000);
    $("typing-txt").textContent=(USERS[other]?.emoji||"")+" "+other+" টাইপ করছে...";
    toggle("typing-bar","on",!!typing);
  });

  onValue(seenRef,snap=>{ seenCache=snap.val()||{}; drawTicks(); });
}

/* ── send text ── */
window.sendMsg=async()=>{
  const inp=$("msg-input"), txt=inp.value.trim();
  if(!txt||!me)return;
  inp.value=""; inp.style.height="auto"; clearTyp();
  const timer=parseInt($("timer-sel").value)||0;
  const pl={name:me,text:txt,type:"text",ts:serverTimestamp(),expiresAt:timer?Date.now()+timer*1000:null};
  if(replyTo){pl.replyTo=replyTo; cancelReply();}
  await push(msgsRef,pl);
  goBottom();
};

/* ── image ── */
$("file-in").addEventListener("change",function(){
  const f=this.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement("canvas");
      let w=img.width,h=img.height,M=800;
      if(w>M){h=h*M/w;w=M;} if(h>M){w=w*M/h;h=M;}
      c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);
      pendingImg=c.toDataURL("image/jpeg",.72);
      $("prev-thumb").src=pendingImg;
      toggle("imgprev","on",true);
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(f); this.value="";
});

window.cancelImg=()=>{ pendingImg=null; toggle("imgprev","on",false); };
window.sendImg=async()=>{
  if(!pendingImg||!me)return;
  toggle("imgprev","on",false); toggle("upbar","on",true);
  const timer=parseInt($("timer-sel").value)||0;
  const pl={name:me,type:"image",image:pendingImg,ts:serverTimestamp(),expiresAt:timer?Date.now()+timer*1000:null};
  if(replyTo){pl.replyTo=replyTo; cancelReply();}
  await push(msgsRef,pl);
  toggle("upbar","on",false); pendingImg=null; goBottom();
};

/* ── reply ── */
window.setReply=(key,name,text,type)=>{
  replyTo={key,name,text:type==="image"?"📷 ছবি":text};
  $("rb-name").textContent=name; $("rb-text").textContent=replyTo.text;
  toggle("rbanner","on",true); $("msg-input").focus();
  const el=box.querySelector(`.grp[data-key="${key}"]`);
  if(el){el.style.background="rgba(37,211,102,.1)";setTimeout(()=>el.style.background="",600);}
};
window.cancelReply=()=>{ replyTo=null; toggle("rbanner","on",false); };

/* ── reactions ── */
window.openEmoji=(key,btn)=>{
  emojiKey=key;
  const pk=$("epicker"); pk.classList.add("on");
  const r=btn.getBoundingClientRect();
  let top=r.top-58; if(top<4)top=r.bottom+6;
  pk.style.top=top+"px";
  pk.style.left=Math.max(4,Math.min(r.left-40,window.innerWidth-260))+"px";
};
window.reactWith=async emoji=>{
  if(!emojiKey||!me)return;
  $("epicker").classList.remove("on");
  const mRef=ref(db,"messages/"+emojiKey);
  const snap=await get(mRef); if(!snap.exists())return;
  const rxns=snap.val().reactions||{};
  const users=rxns[emoji]||[];
  if(users.includes(me)){rxns[emoji]=users.filter(n=>n!==me);if(!rxns[emoji].length)delete rxns[emoji];}
  else rxns[emoji]=[...users,me];
  await update(mRef,{reactions:rxns}); emojiKey=null;
};
document.addEventListener("click",e=>{
  if(!$("epicker").contains(e.target)&&!e.target.classList.contains("abt"))
    $("epicker").classList.remove("on");
});

/* ── delete ── */
window.delMsg=key=>remove(ref(db,"messages/"+key));
window.confirmDel=()=>toggle("confirm","on",true);
window.closeConf=()=>toggle("confirm","on",false);
window.delAll=async()=>{ await remove(msgsRef); closeConf(); };

/* ── ticks ── */
function drawTicks(){
  const other=Object.keys(USERS).find(n=>n!==me);
  const otherSeen=seenCache[other]||"";
  box.querySelectorAll(".tick[data-key]").forEach(el=>{
    const seen=el.dataset.key<=otherSeen;
    el.textContent=seen?"✓✓":"✓"; el.className="tick "+(seen?"seen":"sent");
  });
}

/* ── lightbox ── */
window.openLbox=src=>{ $("lbox-img").src=src; toggle("lbox","on",true); };
window.closeLbox=()=>toggle("lbox","on",false);

/* ── swipe to reply ── */
function addSwipe(el,grp,key,name,text,type,isMine){
  let sx=0,sy=0,dx=0,ok=false; const T=60;
  const arrow=grp.querySelector(".rarrow");
  el.addEventListener("touchstart",e=>{
    sx=e.touches[0].clientX; sy=e.touches[0].clientY;
    ok=true; dx=0; el.classList.add("dragging");
  },{passive:true});
  el.addEventListener("touchmove",e=>{
    if(!ok)return;
    dx=e.touches[0].clientX-sx;
    const dy=e.touches[0].clientY-sy;
    if(Math.abs(dy)>Math.abs(dx)){ok=false;el.style.transform="";return;}
    const valid=isMine?dx<0:dx>0;
    if(!valid){el.style.transform="";arrow.classList.remove("show");return;}
    const t=Math.min(Math.abs(dx),T+20);
    el.style.transform=isMine?`translateX(-${t}px)`:`translateX(${t}px)`;
    arrow.classList.toggle("show",Math.abs(dx)>T*.5);
  },{passive:true});
  el.addEventListener("touchend",()=>{
    if(!ok)return; ok=false; el.classList.remove("dragging");
    el.style.transform=""; arrow.classList.remove("show");
    if(Math.abs(dx)>=T) setReply(key,name,text,type);
    dx=0;
  });
}

/* ── build message ── */
function buildMsg(key,msg,isNew){
  const isMine=msg.name===me;
  const u=USERS[msg.name]||{emoji:"👤",color:"#888"};
  const d=msg.ts?new Date(msg.ts):new Date();
  const ds=d.toLocaleDateString("bn-BD",{day:"numeric",month:"long",year:"numeric"});

  if(ds!==lastDate){
    lastDate=ds;
    const sep=document.createElement("div");
    sep.className="date-sep"; sep.textContent=ds;
    box.appendChild(sep);
  }

  const grp=document.createElement("div");
  grp.className="grp "+(isMine?"me":"them");
  if(isNew) grp.style.animation="pop .15s ease";
  grp.dataset.key=key;

  /* brow */
  const brow=document.createElement("div"); brow.className="brow";

  /* actions */
  const acts=document.createElement("div"); acts.className="acts";
  const mkBtn=(ico,ttl,fn)=>{
    const b=document.createElement("button"); b.className="abt"; b.title=ttl;
    b.textContent=ico; b.onclick=fn; return b;
  };
  acts.appendChild(mkBtn("↩","রিপ্লাই",()=>setReply(key,msg.name,msg.text||"",msg.type)));
  acts.appendChild(mkBtn("😊","রিঅ্যাক্ট",e=>{ e.stopPropagation(); openEmoji(key,e.currentTarget); }));
  if(isMine) acts.appendChild(mkBtn("🗑","মুছো",()=>delMsg(key)));

  /* swipe wrap */
  const sw=document.createElement("div"); sw.className="sw";
  const arr=document.createElement("div"); arr.className="rarrow"; arr.textContent="↩";
  sw.appendChild(arr);

  /* bubble wrap */
  const bw=document.createElement("div"); bw.className="bwrap";

  if(msg.replyTo){
    const ru=USERS[msg.replyTo.name]||{color:"#888"};
    const hw=document.createElement("div"); hw.className="hreply";
    const rp=document.createElement("div"); rp.className="rpreview";
    rp.style.color=ru.color; rp.style.borderColor=ru.color;
    rp.innerHTML=`<div class="rname">${esc(msg.replyTo.name)}</div><div class="rtxt">${esc(msg.replyTo.text||"")}</div>`;
    rp.onclick=()=>{
      const orig=box.querySelector(`.grp[data-key="${msg.replyTo.key}"]`);
      if(orig){orig.scrollIntoView({behavior:"smooth",block:"center"});orig.style.background="rgba(37,211,102,.12)";setTimeout(()=>orig.style.background="",1200);}
    };
    hw.appendChild(rp);
    appendContent(hw,msg);
    bw.appendChild(hw);
  } else {
    appendContent(bw,msg);
  }

  /* meta */
  const meta=document.createElement("div"); meta.className="meta";
  if(msg.expiresAt){
    const rem=Math.max(0,Math.round((msg.expiresAt-Date.now())/60000));
    const tb=document.createElement("span"); tb.className="tbadge"; tb.textContent="⏱"+rem+"মি"; meta.appendChild(tb);
  }
  const tm=document.createElement("span"); tm.textContent=d.toLocaleTimeString("bn-BD",{hour:"2-digit",minute:"2-digit"}); meta.appendChild(tm);
  if(isMine){
    const other=Object.keys(USERS).find(n=>n!==me);
    const seen=key<=(seenCache[other]||"");
    const tk=document.createElement("span"); tk.className="tick "+(seen?"seen":"sent"); tk.dataset.key=key; tk.textContent=seen?"✓✓":"✓"; meta.appendChild(tk);
  }
  bw.appendChild(meta);

  /* reactions */
  const rxns=msg.reactions||{};
  if(Object.keys(rxns).length){
    const rd=document.createElement("div"); rd.className="rxns";
    Object.entries(rxns).forEach(([em,users])=>{
      if(!users?.length)return;
      const ch=document.createElement("div");
      ch.className="rxchip"+(users.includes(me)?" mine":"");
      ch.textContent=em+" "+users.length;
      ch.onclick=()=>{ emojiKey=key; reactWith(em); };
      rd.appendChild(ch);
    });
    bw.appendChild(rd);
  }

  sw.appendChild(bw);
  if(isMine){ brow.appendChild(acts); brow.appendChild(sw); }
  else       { brow.appendChild(sw);  brow.appendChild(acts); }
  grp.appendChild(brow);

  /* touch select */
  grp.addEventListener("touchstart",()=>{
    box.querySelectorAll(".grp.sel").forEach(g=>g.classList.remove("sel"));
    grp.classList.add("sel");
  },{passive:true});

  addSwipe(sw,grp,key,msg.name,msg.text||"",msg.type,isMine);
  box.appendChild(grp);
}

function appendContent(wrap,msg){
  if(msg.type==="image"&&msg.image){
    const iw=document.createElement("div"); iw.className="imgb";
    iw.onclick=()=>openLbox(msg.image);
    const ie=document.createElement("img"); ie.src=msg.image; ie.loading="lazy"; ie.alt="ছবি";
    iw.appendChild(ie); wrap.appendChild(iw);
  } else {
    const b=document.createElement("div"); b.className="bbl";
    b.innerHTML=esc(msg.text||""); wrap.appendChild(b);
  }
}

/* ── input auto-height ── */
const inp=$("msg-input");
inp.addEventListener("input",function(){
  this.style.height="auto";
  this.style.height=Math.min(this.scrollHeight,130)+"px";
});
inp.addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();return;}
  sendTyp();
});
inp.addEventListener("blur",clearTyp);
</script>
</body>
</html>
