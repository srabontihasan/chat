<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>আমাদের চ্যাট 💬</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --green:#25d366;--green-dk:#075e54;--green-md:#128c7e;
  --green-bubble:#005c4b;--blue-tick:#53bdeb;
  --bg:#0b141a;--hdr:#1f2c34;--inp-bg:#2a3942;
  --bubble-in:#1e2b33;--txt:#e9edef;--txt2:#8696a0;
  --border:rgba(134,150,160,.15);--r:10px;
  --danger:#e53e3e;--boy:#3b82f6;--girl:#ec4899;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}

html, body {
  height: 100%;
  width: 100%;
  margin: 0; padding: 0;
  overflow: hidden;
  font-family: 'Noto Sans Bengali', sans-serif;
  background: var(--bg);
  color: var(--txt);
}

/* ── APP SHELL ── */
#app {
  display: flex;
  flex-direction: column;
  width: 100%;
  overflow: hidden;
  position: relative;
  /* height set by JS */
}

/* ── LOGIN ── */
#login-screen{
  position:fixed;inset:0;z-index:500;background:var(--bg);
  display:flex;align-items:center;justify-content:center;padding:24px;
  transition:opacity .3s,transform .3s;
}
#login-screen.hiding{opacity:0;transform:scale(.96);pointer-events:none}
#login-screen.hidden{display:none}
.login-card{background:var(--hdr);border-radius:22px;padding:36px 28px;width:100%;max-width:320px;border:1px solid var(--border);box-shadow:0 16px 48px rgba(0,0,0,.5)}
.lbl{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--green);margin-bottom:12px;display:block}
.pass-wrap{position:relative;margin-bottom:10px}
#login-input{width:100%;padding:15px 46px 15px 18px;background:var(--inp-bg);border:1.5px solid rgba(255,255,255,.1);border-radius:14px;color:var(--txt);font-size:18px;font-family:inherit;letter-spacing:4px;outline:none;transition:border-color .2s;-webkit-appearance:none}
#login-input:focus{border-color:var(--green)}
#login-input::placeholder{opacity:.3;letter-spacing:2px}
.eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:18px;cursor:pointer;opacity:.5;padding:4px}
.err{min-height:18px;font-size:12px;color:#ff6b6b;text-align:center;margin-bottom:10px}
#login-btn{width:100%;padding:15px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--green-md),var(--green));color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:opacity .15s,transform .1s;box-shadow:0 4px 16px rgba(37,211,102,.3)}
#login-btn:active{opacity:.9;transform:scale(.98)}

/* ── HEADER ── */
#hdr{
  flex-shrink:0;background:var(--hdr);
  display:flex;align-items:center;gap:10px;
  padding:0 8px 0 14px;height:60px;
  border-bottom:1px solid var(--border);
  padding-top:env(safe-area-inset-top);
  position:relative;z-index:10;
}
.av-wrap{position:relative;flex-shrink:0}
.av{width:42px;height:42px;border-radius:50%;background:var(--green-dk);display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid transparent;transition:border-color .3s}
.av.boy-av{border-color:rgba(59,130,246,.4)}.av.girl-av{border-color:rgba(236,72,153,.4)}
.online-dot{width:11px;height:11px;border-radius:50%;background:#4ade80;border:2px solid var(--hdr);position:absolute;bottom:1px;right:1px;transition:background .3s}
.online-dot.offline{background:var(--txt2)}
.hdr-info{flex:1;min-width:0;cursor:pointer}
.hdr-info h2{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-status{font-size:11.5px;margin-top:1px;display:flex;align-items:center;gap:4px;transition:color .3s}
.hdr-status.online{color:#4ade80}.hdr-status.offline{color:var(--txt2)}.hdr-status.typing-status{color:var(--green)}

/* Unread badge in header — now on bell */
#hdr-unread{display:none!important}/* legacy, replaced by bell badge */
#bell-badge{
  position:absolute;top:-2px;right:-2px;
  background:var(--danger);color:#fff;
  font-size:10px;font-weight:700;
  min-width:17px;height:17px;border-radius:9px;
  padding:0 4px;display:none;
  align-items:center;justify-content:center;
  pointer-events:none;
  animation:badgePop .2s cubic-bezier(.34,1.56,.64,1);
}
#bell-badge.on{display:flex}
@keyframes badgePop{from{transform:scale(0)}to{transform:scale(1)}}

#online-badge{background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.3);color:#4ade80;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;flex-shrink:0;display:none}
#online-badge.on{display:block}
.hdr-actions{display:flex;gap:2px;flex-shrink:0}
.icon-btn{width:42px;height:42px;border-radius:50%;background:none;border:none;color:var(--txt2);font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.icon-btn:active{background:rgba(255,255,255,.08)}
#timer-sel{background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:20px;color:var(--txt2);font-size:10px;padding:5px 7px;font-family:inherit;outline:none;cursor:pointer;max-width:68px}
#timer-sel option{background:#1f2c34;color:var(--txt)}

/* ── MESSAGES ── */
#msgs{
  flex: 1 1 0;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding: 8px 10px 6px;
  display: flex;
  flex-direction: column;
  gap: 1px;
  will-change: scroll-position;
  /* CRITICAL: min-height:0 allows flex shrinking when keyboard appears */
  min-height: 0;
}
#msgs::-webkit-scrollbar{width:3px}
#msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}

.date-sep{align-self:center;background:rgba(31,44,52,.92);backdrop-filter:blur(4px);color:var(--txt2);font-size:11px;padding:4px 14px;border-radius:8px;margin:10px 0;pointer-events:none;border:1px solid var(--border)}

/* GROUP */
.grp{display:flex;flex-direction:column;animation:msgPop .18s cubic-bezier(.34,1.56,.64,1) both}
@keyframes msgPop{from{opacity:0;transform:translateY(8px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.grp.me{align-items:flex-end}.grp.them{align-items:flex-start}.grp+.grp{margin-top:2px}

.brow{display:flex;align-items:flex-end;gap:4px;max-width:min(84vw,390px)}
.grp.me .brow{flex-direction:row}.grp.them .brow{flex-direction:row-reverse}

.sw{position:relative;border-radius:var(--r);max-width:100%;will-change:transform;transform:translateZ(0);transition:transform .15s cubic-bezier(.25,.46,.45,.94)}
.sw.dragging{transition:none}
.rarrow{position:absolute;top:50%;transform:translateY(-50%);font-size:14px;opacity:0;pointer-events:none;color:var(--txt2);transition:opacity .12s}
.grp.me .rarrow{left:-22px}.grp.them .rarrow{right:-22px}
.rarrow.show{opacity:1}

/* NO side action buttons anymore — long press shows context menu */
.bwrap{display:flex;flex-direction:column}
.grp.me .bwrap{align-items:flex-end}.grp.them .bwrap{align-items:flex-start}

/* Reply preview */
.rpreview{border-left:3px solid currentColor;padding:5px 9px 4px;border-radius:8px 8px 0 0;font-size:11.5px;background:rgba(0,0,0,.25);max-width:100%;overflow:hidden;cursor:pointer}
.rpreview .rname{font-weight:700;margin-bottom:2px;font-size:12px}
.rpreview .rtxt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.75}

/* Bubble */
.bbl{padding:7px 11px;font-size:14.5px;line-height:1.6;word-break:break-word;white-space:pre-wrap;overflow-wrap:anywhere;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.grp.me .bbl{background:var(--green-bubble);color:#e9edef;border-radius:var(--r) var(--r) 2px var(--r)}
.grp.them .bbl{background:var(--bubble-in);color:#e9edef;border-radius:var(--r) var(--r) var(--r) 2px}
.hreply .bbl{border-radius:0 0 var(--r) var(--r)!important}
.grp.me .hreply .bbl{border-radius:0 0 2px var(--r)!important}
.grp.them .hreply .bbl{border-radius:0 0 var(--r) 2px!important}

/* edited tag */
.edited-tag{font-size:10px;color:rgba(255,255,255,.4);margin-left:4px;font-style:italic}

/* long-press highlight */
.grp.lp-active .bbl,
.grp.lp-active .voice-bbl,
.grp.lp-active .imgb{
  filter:brightness(1.15);
  transform:scale(1.01);
  transition:filter .15s,transform .15s;
}
.grp.highlight{background:rgba(37,211,102,.1);border-radius:10px;transition:background .7s}
.grp.copied-flash{animation:copiedFlash .4s ease}
@keyframes copiedFlash{0%,100%{background:transparent}50%{background:rgba(37,211,102,.18);border-radius:10px}}

/* Image */
.imgb{max-width:220px;border-radius:var(--r);overflow:hidden;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.imgb img{width:100%;display:block}

/* Voice bubble */
.voice-bbl{display:flex;align-items:center;gap:10px;padding:8px 12px;min-width:190px;max-width:250px;border-radius:var(--r);box-shadow:0 1px 3px rgba(0,0,0,.25)}
.grp.me .voice-bbl{background:var(--green-bubble);border-radius:var(--r) var(--r) 2px var(--r)}
.grp.them .voice-bbl{background:var(--bubble-in);border-radius:var(--r) var(--r) var(--r) 2px}
.voice-play{width:38px;height:38px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,transform .1s}
.voice-play:active{transform:scale(.92)}.voice-play.playing{background:rgba(37,211,102,.4)}
.voice-info{flex:1;min-width:0}
.voice-waveform{display:flex;align-items:center;gap:2px;height:22px;overflow:hidden}
.voice-waveform .bar{width:3px;border-radius:3px;background:rgba(255,255,255,.35);flex-shrink:0;transition:background .1s}
.voice-waveform .bar.active{background:rgba(255,255,255,.9)}
.voice-dur{font-size:10.5px;color:rgba(255,255,255,.55);margin-top:3px}

/* Meta */
.meta{display:flex;align-items:center;gap:3px;font-size:10.5px;color:var(--txt2);margin-top:2px;padding:0 3px;user-select:none;flex-wrap:wrap}
.grp.me .meta{justify-content:flex-end}.grp.them .meta{justify-content:flex-start}
.tick{font-size:13px;line-height:1;transition:color .3s}
.tick.seen{color:var(--blue-tick)}.tick.sent{color:var(--txt2)}
.tbadge{color:#f59e0b;font-size:10px}

/* Reactions */
.rxns{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px;padding:0 2px}
.rxchip{background:var(--hdr);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:3px 8px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:3px;color:var(--txt2);transition:border-color .1s}
.rxchip.mine{border-color:var(--green);color:var(--green);background:rgba(37,211,102,.1)}
.rxchip:active{transform:scale(.92)}

/* ── LONG PRESS CONTEXT MENU ── */
#ctx-menu{
  position:fixed;z-index:700;
  background:var(--hdr);
  border-radius:18px;
  padding:6px;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  border:1px solid var(--border);
  display:none;min-width:180px;
  flex-direction:column;gap:2px;
  animation:ctxPop .18s cubic-bezier(.34,1.56,.64,1);
}
#ctx-menu.on{display:flex}
@keyframes ctxPop{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}

/* Reaction row inside context menu */
#ctx-react-row{
  display:flex;align-items:center;justify-content:space-around;
  padding:8px 6px;
  border-bottom:1px solid var(--border);
  margin-bottom:4px;
}
.ctx-react-btn{font-size:26px;cursor:pointer;transition:transform .1s;line-height:1;padding:2px}
.ctx-react-btn:active{transform:scale(1.4)}

.ctx-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 14px;border-radius:12px;cursor:pointer;
  transition:background .12s;font-size:14px;font-weight:500;
}
.ctx-item:active{background:rgba(255,255,255,.08)}
.ctx-item .ctx-ico{font-size:18px;width:24px;text-align:center;flex-shrink:0}
.ctx-item.danger{color:var(--danger)}

/* Context menu backdrop */
#ctx-backdrop{
  position:fixed;inset:0;z-index:699;
  background:rgba(0,0,0,.25);
  display:none;
}
#ctx-backdrop.on{display:block}

/* ── EDIT BANNER ── */
#edit-banner{
  flex-shrink:0;background:rgba(37,211,102,.1);
  padding:8px 14px;display:none;align-items:center;gap:10px;
  border-top:1px solid rgba(37,211,102,.2);
}
#edit-banner.on{display:flex}
.eb-inner{flex:1;border-left:3px solid var(--green);padding:3px 10px;font-size:12px;min-width:0}
.eb-label{font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.eb-text{color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eb-x{width:30px;height:30px;border-radius:50%;border:none;background:rgba(255,255,255,.08);color:var(--txt2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── REPLY BANNER ── */
#rbanner{flex-shrink:0;background:var(--inp-bg);padding:8px 14px;display:none;align-items:center;gap:10px;border-top:1px solid var(--border)}
#rbanner.on{display:flex}
.rb-inner{flex:1;border-left:3px solid var(--green);padding:3px 10px;font-size:12px;min-width:0}
.rb-name{font-weight:700;color:var(--green);margin-bottom:2px}
.rb-text{color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rb-x{width:30px;height:30px;border-radius:50%;border:none;background:rgba(255,255,255,.08);color:var(--txt2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── IMAGE PREVIEW ── */
#imgprev{flex-shrink:0;background:var(--inp-bg);border-top:1px solid var(--border);padding:10px 14px;display:none;align-items:center;gap:12px}
#imgprev.on{display:flex}
#prev-thumb{width:56px;height:56px;border-radius:10px;object-fit:cover;flex-shrink:0}
.prev-lbl{font-size:13px;color:var(--txt2);flex:1}
.prev-x{width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,.08);color:var(--txt2);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.prev-send{width:44px;height:44px;border-radius:50%;border:none;background:var(--green);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(37,211,102,.4)}
#upbar{flex-shrink:0;background:var(--hdr);padding:5px 16px;font-size:12px;color:var(--green);display:none;align-items:center;gap:6px;border-top:1px solid var(--border)}
#upbar.on{display:flex}

/* ── VOICE OVERLAY ── */
#rec-overlay{position:fixed;inset:0;z-index:450;background:rgba(11,20,26,.96);display:none;flex-direction:column;align-items:center;justify-content:center;gap:24px}
#rec-overlay.on{display:flex}
.rec-wave{display:flex;align-items:center;gap:5px;height:60px}
.rec-wave span{width:5px;border-radius:5px;background:var(--girl);animation:recWave 1s ease-in-out infinite}
.rec-wave span:nth-child(1){height:20px}.rec-wave span:nth-child(2){height:35px;animation-delay:.1s}.rec-wave span:nth-child(3){height:50px;animation-delay:.2s}.rec-wave span:nth-child(4){height:35px;animation-delay:.3s}.rec-wave span:nth-child(5){height:20px;animation-delay:.4s}.rec-wave span:nth-child(6){height:40px;animation-delay:.15s}.rec-wave span:nth-child(7){height:55px;animation-delay:.25s}.rec-wave span:nth-child(8){height:30px;animation-delay:.35s}
@keyframes recWave{0%,100%{transform:scaleY(.5);opacity:.5}50%{transform:scaleY(1);opacity:1}}
#rec-timer{font-size:44px;font-weight:700;color:var(--txt);font-variant-numeric:tabular-nums;letter-spacing:2px}
#rec-label{font-size:14px;color:var(--txt2)}
.rec-actions{display:flex;gap:28px;align-items:center}
.rec-btn{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;background:none;border:none;color:var(--txt)}
.rec-btn-ico{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;transition:transform .1s}
.rec-btn:active .rec-btn-ico{transform:scale(.92)}
.rec-btn-lbl{font-size:11px;color:var(--txt2);font-family:'Noto Sans Bengali',sans-serif}
#rec-cancel .rec-btn-ico{background:rgba(229,62,62,.15);font-size:20px}
#rec-send .rec-btn-ico{background:var(--green);box-shadow:0 4px 16px rgba(37,211,102,.4)}

/* ── FOOTER ── */
#footer{
  flex-shrink: 0;
  background: var(--bg);
  padding: 6px 8px;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  display: flex;
  align-items: flex-end;
  gap: 5px;
  border-top: 1px solid var(--border);
  width: 100%;
  box-sizing: border-box;
  /* CRITICAL for FB browser: NO position:fixed, stay in normal flex flow */
  position: relative;
  z-index: 10;
  /* Prevent footer from being hidden behind keyboard */
  flex-grow: 0;
}
.inp-wrap{
  flex:1;min-width:0;/* critical — allows flex child to shrink */
  background:var(--inp-bg);border-radius:26px;
  display:flex;align-items:flex-end;
  padding:3px 4px 3px 6px;gap:2px;
  min-height:46px;
  transition:box-shadow .2s;
  overflow:hidden;
}
.inp-wrap:focus-within{box-shadow:0 0 0 1.5px rgba(37,211,102,.25)}
.fi-btn{
  width:36px;height:36px;flex-shrink:0;border-radius:50%;
  background:none;border:none;color:var(--txt2);font-size:19px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  position:relative;transition:color .15s;
}
.fi-btn::after{content:'';position:absolute;inset:-4px}
.fi-btn:active{color:var(--green)}
#msg-input{
  flex:1;min-width:0;/* allow shrink */
  background:transparent;border:none;color:var(--txt);
  font-family:inherit;resize:none;outline:none;
  max-height:130px;line-height:1.5;
  padding:10px 4px;align-self:center;font-size:16px;
}
#msg-input::placeholder{color:var(--txt2);opacity:.6}
#send-btn{
  width:46px;height:46px;
  flex-shrink:0;flex-grow:0;/* never grow or shrink */
  border-radius:50%;
  background:var(--green);color:#fff;border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 12px rgba(37,211,102,.35);
  transition:background .15s,transform .1s;
  padding:0;
}
#send-btn:active{background:var(--green-md);transform:scale(.93)}
#send-btn.edit-mode{background:var(--boy);box-shadow:0 2px 12px rgba(59,130,246,.35)}
#voice-btn{
  width:46px;height:46px;
  flex-shrink:0;flex-grow:0;
  border-radius:50%;background:var(--inp-bg);border:none;
  color:var(--txt2);font-size:21px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s,transform .1s;
}
#voice-btn:active{background:var(--girl);color:#fff;transform:scale(1.1)}
#file-in{display:none}

/* ── EMOJI KEYBOARD ── */
#emoji-kbd{flex-shrink:0;background:var(--hdr);border-top:1px solid var(--border);padding:10px 8px 12px;display:none;flex-wrap:wrap;gap:2px;max-height:200px;overflow-y:auto}
#emoji-kbd.on{display:flex}
.ekbd-emoji{width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;border-radius:8px;transition:background .1s}
.ekbd-emoji:active{background:rgba(255,255,255,.1);transform:scale(1.2)}

/* ── SETTINGS ── */
#settings-panel{position:fixed;inset:0;z-index:400;background:var(--bg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.25,.46,.45,.94)}
#settings-panel.on{transform:translateX(0)}
.settings-hdr{background:var(--hdr);padding:16px 14px;padding-top:max(16px,env(safe-area-inset-top));display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.settings-hdr h3{font-size:18px;font-weight:700}
.back-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.08);border:none;color:var(--txt);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.settings-body{flex:1;overflow-y:auto;padding:16px}
.settings-profile{display:flex;flex-direction:column;align-items:center;gap:10px;padding:20px 0 24px}
.settings-av{width:80px;height:80px;border-radius:50%;background:var(--hdr);font-size:44px;display:flex;align-items:center;justify-content:center;border:3px solid var(--border)}
.settings-name{font-size:20px;font-weight:700}.settings-role{font-size:13px;color:var(--txt2)}
.settings-section{margin-bottom:20px}
.settings-section-title{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--green);margin-bottom:10px;padding:0 4px}
.settings-card{background:var(--hdr);border-radius:14px;border:1px solid var(--border);overflow:hidden}
.settings-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border)}
.settings-item:last-child{border-bottom:none}
.si-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.si-info{flex:1;min-width:0}.si-label{font-size:14px;font-weight:600}.si-value{font-size:12px;color:var(--txt2);margin-top:2px}
.tog-wrap{display:flex;align-items:center;justify-content:space-between;padding:14px 16px}
.tog-info{flex:1}.tog-label{font-size:14px;font-weight:600}.tog-sub{font-size:12px;color:var(--txt2);margin-top:2px}
.toggle{width:48px;height:26px;border-radius:13px;background:rgba(255,255,255,.12);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;border:none}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;width:22px;height:22px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.toggle.on::after{transform:translateX(22px)}
#device-log-table{background:var(--hdr);border-radius:14px;border:1px solid var(--border);overflow:hidden}
.dlt-header{display:grid;grid-template-columns:1fr 1fr 64px;padding:10px 14px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--txt2);background:rgba(255,255,255,.03);border-bottom:1px solid var(--border)}
.dlt-row{display:grid;grid-template-columns:1fr 1fr 64px;padding:12px 14px;font-size:12px;border-bottom:1px solid var(--border);align-items:center;gap:4px}
.dlt-row:last-child{border-bottom:none}
.dlt-device{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dlt-time{color:var(--txt2);font-size:11px}
.dlt-badge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:700;text-align:center}
.dlt-badge.active{background:rgba(37,211,102,.15);color:var(--green)}.dlt-badge.past{background:rgba(134,150,160,.1);color:var(--txt2)}
#settings-logout{width:100%;padding:14px;border:none;border-radius:12px;background:rgba(229,62,62,.12);color:var(--danger);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:8px;border:1px solid rgba(229,62,62,.2);transition:background .15s}
#settings-logout:active{background:rgba(229,62,62,.22)}

/* ── LIGHTBOX ── */
#lbox{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.96);display:none;align-items:center;justify-content:center;padding:16px}
#lbox.on{display:flex}
#lbox img{max-width:100%;max-height:90dvh;border-radius:8px}
#lbox-x{position:absolute;top:max(14px,env(safe-area-inset-top));right:14px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ── CONFIRM ── */
#confirm{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;padding:20px}
#confirm.on{display:flex}
.conf-box{background:var(--hdr);border-radius:20px;padding:28px 24px;width:100%;max-width:300px;text-align:center;border:1px solid var(--border);animation:ctxPop .2s cubic-bezier(.34,1.56,.64,1)}
.conf-box h4{font-size:17px;margin-bottom:8px}.conf-box p{font-size:13px;color:var(--txt2);margin-bottom:24px;line-height:1.5}
.conf-btns{display:flex;gap:10px}
.conf-btns button{flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer}
.c-cancel{background:rgba(255,255,255,.1);color:var(--txt)}.c-del{background:var(--danger);color:#fff}

/* ── CLEAR ANIMATION ── */
#clear-success{position:fixed;inset:0;z-index:950;display:none;align-items:center;justify-content:center;pointer-events:none;background:rgba(11,20,26,.7)}
#clear-success.on{display:flex}
.clear-emoji{font-size:90px;animation:clearPop .7s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes clearPop{0%{opacity:0;transform:scale(.2) rotate(-20deg)}50%{opacity:1;transform:scale(1.2) rotate(5deg)}75%{transform:scale(.95)}100%{opacity:0;transform:scale(.8)}}

/* ── SCROLL DOWN ── */
#scrolldn{position:fixed;right:14px;bottom:80px;z-index:100;width:42px;height:42px;border-radius:50%;background:var(--hdr);border:1px solid var(--border);color:var(--txt2);font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.4)}
#scrolldn.on{display:flex}

/* ── TOAST ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--hdr);color:var(--txt);padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;border:1px solid var(--border);box-shadow:0 4px 16px rgba(0,0,0,.4);white-space:nowrap;pointer-events:none}

@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
</style>
</head>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,push,onValue,remove,update,set,serverTimestamp,get,onDisconnect}
  from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";


const USERS={
  Datla:{emoji:"👦",color:"#3b82f6",role:"ছেলে 💙"},
  Datli:{emoji:"👧",color:"#ec4899",role:"মেয়ে 💗"},
};
const FB={
  apiKey:"AIzaSyDi7Adni15nsyeKejv-KgvHxlXTdp_eZZ4",
  authDomain:"chat-60009.firebaseapp.com",
  databaseURL:"https://chat-60009-default-rtdb.firebaseio.com",
  projectId:"chat-60009",
  storageBucket:"chat-60009.firebasestorage.app",
  messagingSenderId:"830655265752",
  appId:"1:830655265752:web:133cca04624244642d50ad"
};
const firebaseApp=initializeApp(FB);
const db=getDatabase(firebaseApp);
const msgsRef=ref(db,"messages"),typRef=ref(db,"typing"),seenRef=ref(db,"seen"),presRef=ref(db,"presence");

let me=sessionStorage.getItem("chat_user");
let showPass=false,pendingImg=null,replyTo=null,typTimer=null;
let allKeys=[],seenCache={},presCache={},unreadCount=0,emojiKbdOpen=false;
let longPressTimer=null;

// Context menu state

const EMOJIS=["😀","😂","🥰","😍","😎","🤩","😢","😭","😡","🥺","👍","👎","👏","🙌","❤️","💕","💔","🔥","⭐","✨","🎉","🎊","🎁","🍕","☕","🍦","🌸","🌙","☀️","🌈","😘","😋","🤗","😴","🥳","😏","🙃","😇","🤭","😅","💯","🙏","💪","👀","🫶","🤝","✌️","🫠","💀","👻","😤","🤔","🥱","🤑","🤯","🥴","😬","🙄","😌","🤧"];

/* ── KEYBOARD FIX ──
  সব browser এ কাজ করে।
  FB browser এ: footer এর position track করে msgs scroll করা হয়।
*/
const app = document.getElementById("app");
let _fullH = window.innerHeight;

function setAppH(h){ app.style.height = h + "px"; }
setAppH(_fullH);
window.addEventListener("load", ()=>{ _fullH=window.innerHeight; setAppH(_fullH); });

// Standard browsers (Chrome, Safari): visualViewport shrinks on keyboard
if(window.visualViewport){
  window.visualViewport.addEventListener("resize", ()=>{
    setAppH(window.visualViewport.height);
    bScroll();
  },{passive:true});
}
window.addEventListener("resize", ()=>{
  const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  setAppH(h); bScroll();
},{passive:true});

function bScroll(){
  requestAnimationFrame(()=>{ const b=$("msgs"); if(b) b.scrollTop=b.scrollHeight; });
}

// FB browser fix: poll footer position, scroll msgs up if footer hidden
let _fbTimer = null;
function onInputFocus(){
  // Standard fix attempts
  [100,300,600].forEach(d=>setTimeout(()=>{
    const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    setAppH(h); bScroll();
  }, d));

  // FB browser: watch footer every 80ms and scroll msgs until footer is visible
  clearInterval(_fbTimer);
  let attempts = 0;
  _fbTimer = setInterval(()=>{
    attempts++;
    const footer = document.getElementById("footer");
    if(!footer){ clearInterval(_fbTimer); return; }
    const fBottom = footer.getBoundingClientRect().bottom;
    const vBottom = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    if(fBottom > vBottom + 5){
      // footer কীবোর্ডের নিচে — msgs scroll করো
      const msgs = document.getElementById("msgs");
      if(msgs) msgs.scrollTop += (fBottom - vBottom + 10);
    }
    if(attempts > 25) clearInterval(_fbTimer); // 2s পর বন্ধ
  }, 80);
}

function onInputBlur(){
  clearInterval(_fbTimer);
  setTimeout(()=>{ setAppH(_fullH||window.innerHeight); bScroll(); }, 350);
}

document.addEventListener("visibilitychange",()=>{
  const v=!document.hidden;
  if(v&&me){markSeen();setPresence(true);}
  else if(me) setPresence(false);
});

const $=id=>document.getElementById(id);
const getTimer=()=>{ const el=$("timer-sel"); if(el) return parseInt(el.value)||0; return parseInt(window._timerVal||"0")||0; };
const esc=t=>String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
const show=id=>$(id).classList.add("on");
const hide=id=>$(id).classList.remove("on");
const tog=(id,on)=>$(id).classList.toggle("on",on);

function showToast(msg,dur=2000){
  document.querySelectorAll(".toast").forEach(t=>t.remove());
  const t=document.createElement("div");t.className="toast";t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.cssText="opacity:0;transition:.3s;transform:translateX(-50%) translateY(8px)";setTimeout(()=>t.remove(),300);},dur);
}

function getDeviceInfo(){
  const ua=navigator.userAgent;
  let d="Device";
  if(/iPhone/.test(ua))d="iPhone 📱";
  else if(/iPad/.test(ua))d="iPad 📲";
  else if(/Android/.test(ua)){const m=ua.match(/Android [0-9.]+;\s*([^;)]+)/);d=(m?m[1].trim():"Android")+" 📱";}
  else if(/Windows/.test(ua))d="Windows 💻";
  else if(/Mac/.test(ua))d="MacBook 💻";
  let b="Browser";
  if(/Edg/.test(ua))b="Edge";
  else if(/Chrome/.test(ua))b="Chrome";
  else if(/Firefox/.test(ua))b="Firefox";
  else if(/Safari/.test(ua))b="Safari";
  return{device:d,browser:b};
}

function logDevice(){
  if(!me)return;
  const i=getDeviceInfo();
  const key=`${me}_${Date.now()}`;
  set(ref(db,`devices/${me}/${key}`),{device:i.device,browser:i.browser,ts:Date.now(),active:true});
  get(ref(db,`devices/${me}`)).then(s=>s.forEach(ch=>{
    if(ch.key!==key&&ch.val().active) update(ref(db,`devices/${me}/${ch.key}`),{active:false});
  }));
}

function setPresence(online){
  if(!me)return;
  const p=ref(db,`presence/${me}`);
  set(p,{online,lastSeen:Date.now()});
  if(online) onDisconnect(p).set({online:false,lastSeen:Date.now()});
}

function formatLastSeen(ts){
  if(!ts)return"কখনো আসেনি";
  const d=Date.now()-ts;
  if(d<60000)return"এইমাত্র";
  if(d<3600000)return`${Math.floor(d/60000)} মিনিট আগে`;
  if(d<86400000)return`${Math.floor(d/3600000)} ঘণ্টা আগে`;
  const dt=new Date(ts);
  return dt.toLocaleDateString("bn-BD",{day:"numeric",month:"short"})+" "+dt.toLocaleTimeString("bn-BD",{hour:"2-digit",minute:"2-digit"});
}




/* LOGIN */
window.toggleEye=()=>{showPass=!showPass;$("login-input").type=showPass?"text":"password";$("eye-btn").textContent=showPass?"🙈":"👁";};
window.doLogin=()=>{
  const v=$("login-input").value.trim();
  if(USERS[v]){
    sessionStorage.setItem("chat_user",v);me=v;
    const ls=$("login-screen");ls.classList.add("hiding");
    setTimeout(()=>{ls.classList.add("hidden");ls.classList.remove("hiding");},300);
    startChat();
  } else {
    $("login-err").textContent="❌ পাসওয়ার্ড সঠিক নয়";
    $("login-input").value="";$("login-input").focus();
    const c=$("login-card");c.style.animation="none";
    requestAnimationFrame(()=>{c.style.animation="shake .3s ease";});
  }
};
$("login-input").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
window.doLogout=()=>{
  clearTyp();setPresence(false);
  sessionStorage.removeItem("chat_user");me=null;
  $("login-input").value="";$("login-err").textContent="";
  $("login-screen").classList.remove("hidden","hiding");
};
if(me&&USERS[me]){$("login-screen").classList.add("hidden");startChat();}

function sendTyp(){if(!me)return;set(ref(db,`typing/${me}`),{ts:Date.now()});clearTimeout(typTimer);typTimer=setTimeout(clearTyp,3000);}
function clearTyp(){if(!me)return;set(ref(db,`typing/${me}`),null);}

/* UNREAD BADGE — on bell icon */
function setUnread(n){
  unreadCount=n;
  const el=$("bell-badge");
  if(n>0){el.textContent=n>99?"99+":n;el.classList.add("on");}
  else el.classList.remove("on");
}

window.toggleNotif=()=>{
  // Clicking bell scrolls to bottom and clears unread
  goBottom();markSeen();
  $("bell-btn").style.animation="none";
  requestAnimationFrame(()=>{ $("bell-btn").style.animation="badgePop .3s ease"; });
};

function markSeen(){
  if(!me||!allKeys.length)return;
  set(ref(db,`seen/${me}`),allKeys[allKeys.length-1]);
  setUnread(0);
}

const box=$("msgs");
function goBottom(){box.scrollTo({top:box.scrollHeight,behavior:"smooth"});markSeen();}
window.goBottom=goBottom;
function isNearBottom(){return box.scrollHeight-box.scrollTop-box.clientHeight<140;}
box.addEventListener("scroll",()=>{
  if(isNearBottom()){hide("scrolldn");markSeen();}
  else tog("scrolldn",true);
},{passive:true});

function startChat(){
  const other=Object.keys(USERS).find(n=>n!==me);
  const ou=USERS[other];
  $("other-av").textContent=ou.emoji;
  $("other-av").className=`av ${other==="Datla"?"boy-av":"girl-av"}`;
  $("other-name").textContent=ou.emoji+" "+other;
  setPresence(true);logDevice();buildEmojiKbd();

  onValue(msgsRef,snap=>{
    const atBot=isNearBottom();
    const oldSet=new Set(allKeys);
    box.innerHTML="";allKeys=[];
    let lastDS="",newOther=0;
    snap.forEach(ch=>{
      const msg=ch.val(),key=ch.key;
      if(msg.expiresAt&&Date.now()>msg.expiresAt){remove(ref(db,"messages/"+key));return;}
      allKeys.push(key);
      if(!oldSet.has(key)&&msg.name!==me) newOther++;
      lastDS=buildMsg(key,msg,!oldSet.has(key),lastDS);
    });
    if(atBot||allKeys.length<=20){setTimeout(goBottom,50);markSeen();}
    else if(newOther>0){setUnread(unreadCount+newOther);show("scrolldn");}
    drawTicks();
  });

  onValue(typRef,snap=>{
    const d=snap.val()||{};
    const typing=d[other]&&(Date.now()-d[other].ts<4000);
    const sub=$("hdr-sub");
    if(typing){sub.textContent="✍️ টাইপ করছে...";sub.className="hdr-status typing-status";}
    else updatePresenceUI(other);
  });

  onValue(seenRef,snap=>{seenCache=snap.val()||{};drawTicks();});

  onValue(presRef,snap=>{
    presCache=snap.val()||{};
    updatePresenceUI(other);
    const both=presCache[me]?.online&&presCache[other]?.online;
    tog("online-badge",!!both);
  });
}

function updatePresenceUI(other){
  const p=presCache[other]||{};
  const sub=$("hdr-sub"),dot=$("other-dot");
  if(p.online){sub.textContent="🟢 অনলাইন";sub.className="hdr-status online";dot.className="online-dot";}
  else{sub.textContent="শেষ দেখা: "+formatLastSeen(p.lastSeen);sub.className="hdr-status offline";dot.className="online-dot offline";}
}

  EMOJIS.forEach(em=>{

/* IMAGE */
$("file-in").addEventListener("change",function(){
  const f=this.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement("canvas");
      let w=img.width,h=img.height,M=900;
      if(w>M){h=h*M/w;w=M;}if(h>M){w=w*M/h;h=M;}
      c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);
      pendingImg=c.toDataURL("image/jpeg",.75);
      $("prev-thumb").src=pendingImg;show("imgprev");
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(f);this.value="";
});
window.cancelImg=()=>{pendingImg=null;hide("imgprev");};
window.sendImg=async()=>{
  if(!pendingImg||!me)return;
  hide("imgprev");show("upbar");
  const timer=getTimer();
  const pl={name:me,type:"image",image:pendingImg,ts:serverTimestamp(),expiresAt:timer?Date.now()+timer*1000:null};
  if(replyTo){pl.replyTo=replyTo;cancelReply();}
  await push(msgsRef,pl);hide("upbar");pendingImg=null;goBottom();
};

/* VOICE */
let mediaRec=null,recChunks=[],recInterval=null,recStart=0;
function bnNum(n){return String(n).replace(/[0-9]/g,d=>"০১২৩৪৫৬৭৮৯"[d]);}
window.startRec=async(e)=>{
  if(e)e.preventDefault();if(mediaRec)return;
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    recChunks=[];mediaRec=new MediaRecorder(stream,{mimeType:"audio/webm"});
    mediaRec.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data);};
    mediaRec.start(100);recStart=Date.now();show("rec-overlay");
    recInterval=setInterval(()=>{
      const s=Math.floor((Date.now()-recStart)/1000);
      $("rec-timer").textContent=bnNum(Math.floor(s/60))+":"+String(s%60).padStart(2,"0");
    },500);
  }catch{showToast("❌ মাইক্রোফোন অনুমতি দাও");}
};
window.cancelRec=()=>{
  if(mediaRec){mediaRec.stop();mediaRec.stream.getTracks().forEach(t=>t.stop());mediaRec=null;}
  clearInterval(recInterval);hide("rec-overlay");recChunks=[];
};
window.stopAndSendRec=()=>{
  if(!mediaRec)return;
  clearInterval(recInterval);
  const dur=Math.floor((Date.now()-recStart)/1000);
  mediaRec.onstop=async()=>{
    const blob=new Blob(recChunks,{type:"audio/webm"});
    const reader=new FileReader();
    reader.onload=async e=>{
      hide("rec-overlay");show("upbar");
      const timer=getTimer();
      const pl={name:me,type:"voice",audio:e.target.result,duration:dur,ts:serverTimestamp(),expiresAt:timer?Date.now()+timer*1000:null};
      if(replyTo){pl.replyTo=replyTo;cancelReply();}
      await push(msgsRef,pl);hide("upbar");goBottom();
    };
    reader.readAsDataURL(blob);
    mediaRec.stream.getTracks().forEach(t=>t.stop());mediaRec=null;recChunks=[];
  };
  mediaRec.stop();
};

/* ── CONTEXT MENU ── */
function openCtxMenu(key,msg,isMine,el){
  ctxKey=key;ctxMsg=msg;ctxIsMine=isMine;
  const menu=$("ctx-menu");

  // Show/hide edit & copy based on type and ownership
  const isText=msg.type==="text";
  $("ctx-copy-item").style.display=isText?"flex":"none";
  $("ctx-edit-item").style.display=(isText&&isMine)?"flex":"none";

  menu.classList.add("on");
  show("ctx-backdrop");

  // Position menu near element but keep in viewport
  const r=el.getBoundingClientRect();
  const mH=280; // approx menu height
  let top=r.top-mH-8;
  if(top<60) top=r.bottom+8;
  if(top+mH>window.innerHeight-20) top=window.innerHeight-mH-20;
  const mW=200;
  let left=r.left;
  if(left+mW>window.innerWidth-8) left=window.innerWidth-mW-8;
  if(left<8) left=8;

  menu.style.top=top+"px";
  menu.style.left=left+"px";
}

window.closeCtxMenu=()=>{
  hide("ctx-menu");hide("ctx-backdrop");
  // remove lp-active from all
  box.querySelectorAll(".grp.lp-active").forEach(g=>g.classList.remove("lp-active"));
};

window.ctxReact=async(emoji)=>{
  closeCtxMenu();
  if(!ctxKey||!me)return;
  const mRef=ref(db,"messages/"+ctxKey);
  const snap=await get(mRef);if(!snap.exists())return;
  const rxns=snap.val().reactions||{};
  const users=rxns[emoji]||[];
  if(users.includes(me)){rxns[emoji]=users.filter(n=>n!==me);if(!rxns[emoji].length)delete rxns[emoji];}
  else rxns[emoji]=[...users,me];
  await update(mRef,{reactions:rxns});
};

window.ctxReply=()=>{
  if(!ctxMsg)return;
  closeCtxMenu();
  setReply(ctxKey,ctxMsg.name,ctxMsg.text||"",ctxMsg.type);
};

window.ctxCopy=()=>{
  if(!ctxMsg?.text)return;
  navigator.clipboard.writeText(ctxMsg.text).then(()=>{
    showToast("📋 কপি হয়েছে!");
    const el=box.querySelector(`.grp[data-key="${ctxKey}"]`);
    if(el){el.classList.add("copied-flash");setTimeout(()=>el.classList.remove("copied-flash"),500);}
  }).catch(()=>showToast("❌ কপি হয়নি"));
  closeCtxMenu();
};

window.ctxEdit=()=>{
  if(!ctxIsMine||!ctxMsg?.text)return;
  closeCtxMenu();
  startEdit(ctxKey,ctxMsg.text);
};

window.ctxDelete=()=>{
  if(!ctxKey)return;
  closeCtxMenu();
  remove(ref(db,"messages/"+ctxKey));
};

/* SWIPE TO REPLY */
function addSwipe(el,grp,key,name,text,type,isMine){
  let sx=0,sy=0,dx=0,ok=false;const T=65;
  const arrow=grp.querySelector(".rarrow");
  el.addEventListener("touchstart",e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;ok=true;dx=0;el.classList.add("dragging");},{passive:true});
  el.addEventListener("touchmove",e=>{
    if(!ok)return;dx=e.touches[0].clientX-sx;const dy=e.touches[0].clientY-sy;
    if(Math.abs(dy)>Math.abs(dx)){ok=false;el.style.transform="";return;}
    const valid=isMine?dx<0:dx>0;
    if(!valid){el.style.transform="";arrow.classList.remove("show");return;}
    const t=Math.min(Math.abs(dx),T+20);
    el.style.transform=isMine?`translateX(-${t}px)`:`translateX(${t}px)`;
    arrow.classList.toggle("show",Math.abs(dx)>T*.5);
  },{passive:true});
  el.addEventListener("touchend",()=>{
    if(!ok)return;ok=false;el.classList.remove("dragging");el.style.transform="";arrow.classList.remove("show");
    if(Math.abs(dx)>=T)setReply(key,name,text,type);dx=0;
  });
}

/* BUILD MESSAGE */
function buildMsg(key,msg,isNew,lastDS){
  const isMine=msg.name===me;
  const d=msg.ts?new Date(msg.ts):new Date();
  const ds=d.toLocaleDateString("bn-BD",{day:"numeric",month:"long",year:"numeric"});
  if(ds!==lastDS){
    const sep=document.createElement("div");sep.className="date-sep";sep.textContent=ds;
    box.appendChild(sep);
  }

  const grp=document.createElement("div");
  grp.className="grp "+(isMine?"me":"them");
  grp.dataset.key=key;

  const brow=document.createElement("div");brow.className="brow";
  const sw=document.createElement("div");sw.className="sw";
  const arr=document.createElement("div");arr.className="rarrow";arr.textContent="↩";sw.appendChild(arr);
  const bw=document.createElement("div");bw.className="bwrap";

  const cw=document.createElement("div");
  if(msg.replyTo){
    cw.className="hreply";
    const ru=USERS[msg.replyTo.name]||{color:"#888"};
    const rp=document.createElement("div");rp.className="rpreview";
    rp.style.color=ru.color;rp.style.borderColor=ru.color;
    rp.innerHTML=`<div class="rname">${esc(msg.replyTo.name)}</div><div class="rtxt">${esc(msg.replyTo.text||"")}</div>`;
    rp.onclick=()=>{
      const o=box.querySelector(`.grp[data-key="${msg.replyTo.key}"]`);
      if(o){o.scrollIntoView({behavior:"smooth",block:"center"});o.classList.add("highlight");setTimeout(()=>o.classList.remove("highlight"),1200);}
    };
    cw.appendChild(rp);
  }
  appendContent(cw,msg,key);bw.appendChild(cw);

  // Meta
  const meta=document.createElement("div");meta.className="meta";
  if(msg.expiresAt){const rem=Math.max(0,Math.round((msg.expiresAt-Date.now())/60000));const tb=document.createElement("span");tb.className="tbadge";tb.textContent="⏱"+rem+"মি";meta.appendChild(tb);}
  if(msg.edited){const et=document.createElement("span");et.className="edited-tag";et.textContent="(সম্পাদিত)";meta.appendChild(et);}
  const tm=document.createElement("span");tm.textContent=d.toLocaleTimeString("bn-BD",{hour:"2-digit",minute:"2-digit"});meta.appendChild(tm);
  if(isMine){
    const other=Object.keys(USERS).find(n=>n!==me);
    const seen=key<=(seenCache[other]||"");
    const tk=document.createElement("span");tk.className="tick "+(seen?"seen":"sent");tk.dataset.key=key;tk.textContent=seen?"✓✓":"✓";meta.appendChild(tk);
  }
  bw.appendChild(meta);

  // Reactions
  const rxns=msg.reactions||{};
  if(Object.keys(rxns).length){
    const rd=document.createElement("div");rd.className="rxns";
    Object.entries(rxns).forEach(([em,users])=>{
      if(!users?.length)return;
      const ch=document.createElement("div");ch.className="rxchip"+(users.includes(me)?" mine":"");
      ch.textContent=em+" "+users.length;
      ch.onclick=()=>ctxReact(em);
      rd.appendChild(ch);
    });
    bw.appendChild(rd);
  }

  sw.appendChild(bw);
  brow.appendChild(sw);
  grp.appendChild(brow);

  // ── LONG PRESS to open context menu ──
  let lpFired=false;
  const startLP=(clientX,clientY)=>{
    lpFired=false;
    longPressTimer=setTimeout(()=>{
      lpFired=true;
      grp.classList.add("lp-active");
      // small vibration on mobile
      if(navigator.vibrate) navigator.vibrate(30);
      openCtxMenu(key,msg,isMine,grp);
    },500);
  };
  const cancelLP=()=>{clearTimeout(longPressTimer);};

  grp.addEventListener("touchstart",e=>{startLP(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  grp.addEventListener("touchend",()=>{cancelLP();},{passive:true});
  grp.addEventListener("touchmove",()=>{cancelLP();},{passive:true});
  // Desktop: right click
  grp.addEventListener("contextmenu",e=>{e.preventDefault();openCtxMenu(key,msg,isMine,grp);});

  addSwipe(sw,grp,key,msg.name,msg.text||"",msg.type,isMine);
  box.appendChild(grp);
  return ds;
}

function appendContent(wrap,msg){
  if(msg.type==="image"&&msg.image){
    const iw=document.createElement("div");iw.className="imgb";iw.onclick=()=>openLbox(msg.image);
    const ie=document.createElement("img");ie.src=msg.image;ie.loading="lazy";ie.alt="ছবি";
    iw.appendChild(ie);wrap.appendChild(iw);
  } else if(msg.type==="voice"&&msg.audio){
    const vb=document.createElement("div");vb.className="voice-bbl";
    const btn=document.createElement("button");btn.className="voice-play";btn.textContent="▶";
    const info=document.createElement("div");info.className="voice-info";
    const wf=document.createElement("div");wf.className="voice-waveform";
    const BARS=20;
    for(let i=0;i<BARS;i++){const bar=document.createElement("div");bar.className="bar";bar.style.height=(7+Math.random()*16)+"px";wf.appendChild(bar);}
    const dur=document.createElement("div");dur.className="voice-dur";
    const s=msg.duration||0;dur.textContent=Math.floor(s/60)+":"+String(s%60).padStart(2,"0");
    info.appendChild(wf);info.appendChild(dur);vb.appendChild(btn);vb.appendChild(info);wrap.appendChild(vb);
    let audio=null,barInt=null;
    btn.onclick=()=>{
      if(!audio){audio=new Audio(msg.audio);audio.onended=()=>{btn.textContent="▶";btn.classList.remove("playing");clearInterval(barInt);wf.querySelectorAll(".bar").forEach(b=>b.classList.remove("active"));};}
      if(audio.paused){
        audio.play();btn.textContent="⏸";btn.classList.add("playing");
        let bi=0;barInt=setInterval(()=>{wf.querySelectorAll(".bar").forEach(b=>b.classList.remove("active"));const b=wf.querySelectorAll(".bar")[bi%BARS];if(b)b.classList.add("active");bi++;},((msg.duration||5)*1000)/BARS);
      } else{audio.pause();btn.textContent="▶";btn.classList.remove("playing");clearInterval(barInt);}
    };
  } else {
    const b=document.createElement("div");b.className="bbl";b.innerHTML=esc(msg.text||"");wrap.appendChild(b);
  }
}

/* INPUT AUTO HEIGHT */
const inp=$("msg-input");
inp.addEventListener("input",function(){this.style.height="auto";this.style.height=Math.min(this.scrollHeight,130)+"px";});
inp.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();return;}sendTyp();});
inp.addEventListener("blur",clearTyp);
</script>
